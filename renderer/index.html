<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MojiDocs</title>
  <link rel="icon" type="image/svg+xml" href="/favicon-moji.svg">
  <style>
    .hljs{background:#f6f8fa;padding:12px 14px;border-radius:6px;overflow-x:auto}
    .hljs-comment,.hljs-quote{color:#6a737d}
    .hljs-keyword,.hljs-selector-tag,.hljs-addition{color:#d73a49}
    .hljs-string,.hljs-attr{color:#032f62}
    .hljs-number,.hljs-literal,.hljs-variable,.hljs-template-variable,.hljs-tag .hljs-attr{color:#005cc5}
    .hljs-title,.hljs-section,.hljs-name{color:#6f42c1}
    .hljs-built_in,.hljs-type{color:#e36209}
    .hljs-deletion{color:#b31d28;background:#ffeef0}
    .hljs-addition{color:#22863a;background:#f0fff4}
  </style>
</head>

  <div id="app"></div>
